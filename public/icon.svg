<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a6e"/>
      <stop offset="100%" stop-color="#11284e"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Book shape -->
  <rect x="140" y="100" width="232" height="312" rx="24" fill="none" stroke="#ffffff" stroke-width="16" opacity="0.3"/>
  <line x1="256" y1="100" x2="256" y2="412" stroke="#ffffff" stroke-width="12" opacity="0.25"/>
  <!-- Left page lines -->
  <line x1="170" y1="160" x2="236" y2="160" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.35"/>
  <line x1="170" y1="190" x2="236" y2="190" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.25"/>
  <line x1="170" y1="220" x2="220" y2="220" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.2"/>
  <!-- Right page lines -->
  <line x1="276" y1="160" x2="342" y2="160" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.35"/>
  <line x1="276" y1="190" x2="342" y2="190" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.25"/>
  <line x1="276" y1="220" x2="320" y2="220" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.2"/>
  <!-- Cross on spine -->
  <line x1="256" y1="110" x2="256" y2="80" stroke="#c9a227" stroke-width="14" stroke-linecap="round"/>
  <line x1="240" y1="92" x2="272" y2="92" stroke="#c9a227" stroke-width="14" stroke-linecap="round"/>
</svg>
